<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Barcelo App - Connexion</title>
    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/components.css">
    <style>
        .login-layout {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: var(--barcelo-blue); /* Applique le bleu Barcelo */
            /* Attention : plus de ../ ici ! */
            background-image: url('/assets/images/barcelo-bg.jpg');
            background-position: center;
            background-size: cover;
            background-repeat: no-repeat;
        }
        .login-card {
            background: var(--surface-white);
            padding: 3rem;
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-card);
            text-align: center;
            width: 100%;
            max-width: 400px;
        }
        .brand-logo {
            width: 150px;
            margin-bottom: 2rem;
        }
        /* Style de secours pour s'assurer que ça marche direct */
        .input-group input {
            width: 100%;
            padding: 0.8rem;
            margin-bottom: 1rem;
            border: 1px solid #ccc;
            border-radius: var(--radius-md);
            box-sizing: border-box;
        }
    </style>
</head>
<body class="login-layout">
    <div class="login-card">
        <img src="/assets/logo.png" alt="Barcelo App" class="brand-logo" onerror="this.style.display='none'">
        <h2 style="font-family: var(--font-heading); color: var(--barcelo-blue); margin-bottom: 1.5rem;">Espace Employé</h2>
        
        <form id="loginForm">
            <div class="input-group">
                <input type="email" id="email" placeholder="Email" required>
            </div>
            <div class="input-group">
                <input type="password" id="password" placeholder="Mot de passe" required>
            </div>
            <button type="submit" class="btn-primary" style="width: 100%; padding: 1rem; border: none; background-color: var(--barcelo-gold); color: white; font-weight: bold; border-radius: var(--radius-md); cursor: pointer;">Se connecter</button>
        </form>
    </div>
    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
</body>
</html>
