<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Virtual Led Display</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="topbar">
    <div class="logo">
      <span class="logo-white">Smart</span><span class="logo-blue">Hotel</span>
    </div>

    <div class="top-info">
      <span id="lastUpdate">Dernière mise à jour : --:--:--</span>
      <span class="status-badge">
        <span id="statusDot" class="status-dot disconnected"></span>
        <span id="statusText">Déconnecté</span>
      </span>
    </div>
  </header>

  <main class="container">
    <section class="card main-card">
      <div class="card-head">
        <div>
          <h1>Afficheur LED</h1>
          <p>AIMLP-AIW3 — miroir temps réel du vrai afficheur</p>
        </div>
      </div>

      <div class="display-wrapper">
        <div class="virtual-display" id="virtualDisplay"></div>
      </div>
    </section>

    <section class="card footer-card">
      <div class="footer-left">
        <div class="device-icon">🖥</div>
        <div>
          <div class="device-title">AFFICHEUR AIMLP-AIW3</div>
          <div class="device-sub">192.168.112.210 : 502</div>
        </div>
      </div>

      <div class="footer-right">
        <span id="footerDot" class="status-dot disconnected"></span>
        <span id="footerStatus">DÉCONNECTÉ</span>
      </div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
