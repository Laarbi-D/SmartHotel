events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;

    # 1. Redirection HTTP vers HTTPS
    server {
        listen 80;
        server_name 192.168.112.158;
        return 301 https://$host$request_uri;
    }

    # 2. Serveur Principal (HTTPS)
    server {
        listen 443 ssl;
        server_name 192.168.112.158;

        ssl_certificate /etc/nginx/certs/hotel.crt;
        ssl_certificate_key /etc/nginx/certs/hotel.key;

        # Sécurité SSL
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;

        # --- FRONTEND (Next.js) ---
        location / {
            proxy_pass http://nextjs_app:3000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # --- BACKEND (Scripts de traitement comme insert_mesure.php) ---
        location /backend/ {
            # On retire /backend/ pour que le serveur PHP reçoive juste "insert_mesure.php"
            rewrite ^/backend/(.*)$ /$1 break;

            proxy_pass http://php_server:80;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # Important pour les scripts d'insertion (POST)
            proxy_read_timeout 300;
            proxy_connect_timeout 300;
            proxy_redirect off;
        }

        # --- ADMIN (Interface de gestion PHP /accueil.php, /product.php) ---
        location /admin/ {
            proxy_pass http://php_server:80;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Sécurité : On bloque l'accès aux fichiers cachés
        location ~ /\.ht {
            deny all;
        }
    }
}