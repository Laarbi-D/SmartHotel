events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;

    map $http_upgrade $connection_upgrade {
        default upgrade;
        '' close;
    }

    # 1. Redirection HTTP vers HTTPS
    server {
        listen 80;
        server_name 192.168.112.158;
        return 301 https://$host$request_uri;
    }

    # 2. Serveur Principal (HTTPS)
    server {
        listen 443 ssl;
        server_name 192.168.112.158;

        ssl_certificate /etc/nginx/certs/hotel.crt;
        ssl_certificate_key /etc/nginx/certs/hotel.key;

        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;

        # --- GRAFANA ---
       location /grafana/ {
            proxy_pass http://grafana_server:3000;
            proxy_http_version 1.1;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Port 443;

            proxy_read_timeout 300;
            proxy_connect_timeout 300;
            proxy_redirect off;
        }

        # --- GRAFANA LIVE (WebSocket) ---
        location /grafana/api/live/ {
            rewrite ^/grafana/(.*)$ /$1 break;

            proxy_pass http://grafana_server:3000;
            proxy_http_version 1.1;

            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Port 443;

            proxy_redirect http://grafana_server:3000/ https://192.168.112.158/grafana/;
        }

        # --- BACKEND ---
        location /backend/ {
            rewrite ^/backend/(.*)$ /$1 break;

            proxy_pass http://php_server:80;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_read_timeout 300;
            proxy_connect_timeout 300;
            proxy_redirect off;
        }

        # --- ADMIN ---
        location /admin/ {
            proxy_pass http://php_server:80;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # --- FRONTEND (Next.js) ---
        location / {
            proxy_pass http://nextjs_app:3000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_intercept_errors on;
            error_page 404 = @fallback_nextjs;
        }

        location @fallback_nextjs {
            proxy_pass http://nextjs_app:3000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Sécurité : blocage fichiers cachés
        location ~ /\.ht {
            deny all;
        }
    }
}