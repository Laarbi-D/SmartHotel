services:
  # --- GATEWAY (Nginx HTTPS) ---
  # C'est lui qui gère le SSL et redirige vers le bon service
  gateway:
    image: nginx:alpine
    container_name: hotel_gateway
    ports:
      - "80:80"   # Redirigera vers le 443
      - "443:443" # Le vrai port HTTPS
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certs:/etc/nginx/certs:ro
    depends_on:
      - frontend
      - php

  # --- BACKEND (PHP) ---
  php:
    build: ./backend
    container_name: php_server
    volumes:
      - ./backend:/var/www/html
    environment:
      TELEGRAM_BOT_TOKEN: "8525409568:AAG3saVaLLltmxPLyPKxKeeTUDefK6eldss"
      TELEGRAM_CHAT_ID: "1601238568"
    depends_on:
      - mysql

  # --- DATABASE (MySQL) ---
  mysql:
    image: mysql:8.0
    container_name: mysql_server
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: smart_hotel_bdd  # <-- CORRECTION ICI : Le bon nom avec les tirets
    volumes:
      - ./mysql-data:/var/lib/mysql
      - ./mysql-init:/docker-entrypoint-initdb.d
    ports:
      - "3306:3306"

  # --- FRONTEND (Next.js) ---
  frontend:
    build: ./frontend
    container_name: nextjs_app
    # On ne l'expose plus sur le port 80 directement, la gateway s'en occupe
    expose:
      - "3000"
    depends_on:
      - php

  # --- PHPMYADMIN & GRAFANA (Gardés pour ton dev) ---
  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: pma
    environment:
      PMA_HOST: mysql
      PMA_USER: root
      PMA_PASSWORD: rootpassword
    ports:
      - "8081:80"

  grafana:
    image: grafana/grafana:latest
    container_name: grafana_server
    ports:
      - "3400:3000" 
    volumes:
      - grafana-storage:/var/lib/grafana
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_SECURITY_ALLOW_EMBEDDING=true
      - GF_SECURITY_COOKIE_SAMESITE=disabled
      - GF_SECURITY_COOKIE_SECURE=false
      - GF_SERVER_ROOT_URL=http://192.168.112.158:3400
      - GF_SERVER_DOMAIN=192.168.112.158
      - GF_SERVER_ENFORCE_DOMAIN=false
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Viewer
    restart: unless-stopped

volumes:
  grafana-storage:
